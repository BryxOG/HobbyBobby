databaseChangeLog:
  - changeSet:
      id: 005-create-user-interests-table
      author: userservice
      changes:
        - createTable:
            tableName: user_interests
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: interest_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: user_interests
            columnNames: user_id, interest_id
            constraintName: pk_user_interests
        - addForeignKeyConstraint:
            baseTableName: user_interests
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_user_interests_user
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: user_interests
            baseColumnNames: interest_id
            referencedTableName: interests
            referencedColumnNames: id
            constraintName: fk_user_interests_interest
            onDelete: CASCADE
        - createIndex:
            tableName: user_interests
            indexName: idx_user_interests_interest_id
            columns:
              - column:
                  name: interest_id
