databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: userservice
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_users_email
              - column:
                  name: avatar
                  type: VARCHAR(512)
              - column:
                  name: level
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: rating
                  type: DECIMAL(3, 2)
              - column:
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: about
                  type: TEXT
