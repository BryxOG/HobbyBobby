databaseChangeLog:
  - changeSet:
      id: 002-create-interests-table
      author: userservice
      changes:
        - createTable:
            tableName: interests
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_interests
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: image
                  type: VARCHAR(512)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: tag
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
