databaseChangeLog:
  - changeSet:
      id: 001-create-events-tables
      author: eventservice
      changes:
        - createTable:
            tableName: events
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_events
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: activity_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: organizer_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - createTable:
            tableName: event_participants
            columns:
              - column:
                  name: event_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: event_participants
            columnNames: event_id, user_id
            constraintName: pk_event_participants
        - addForeignKeyConstraint:
            baseTableName: event_participants
            baseColumnNames: event_id
            referencedTableName: events
            referencedColumnNames: id
            constraintName: fk_event_participants_event
            onDelete: CASCADE
