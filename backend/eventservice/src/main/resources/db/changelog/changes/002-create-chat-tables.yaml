databaseChangeLog:
  - changeSet:
      id: 002-create-chat-tables
      author: eventservice
      changes:
        - createTable:
            tableName: chat_messages
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_chat_messages
                    nullable: false
              - column:
                  name: event_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: author_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: text
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: chat_messages
            baseColumnNames: event_id
            referencedTableName: events
            referencedColumnNames: id
            constraintName: fk_chat_messages_event
            onDelete: CASCADE
        - createIndex:
            indexName: idx_chat_messages_event_created
            tableName: chat_messages
            columns:
              - column:
                  name: event_id
              - column:
                  name: created_at
        - createTable:
            tableName: chat_read_state
            columns:
              - column:
                  name: event_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: last_read_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: chat_read_state
            columnNames: event_id, user_id
            constraintName: pk_chat_read_state
        - addForeignKeyConstraint:
            baseTableName: chat_read_state
            baseColumnNames: event_id
            referencedTableName: events
            referencedColumnNames: id
            constraintName: fk_chat_read_state_event
            onDelete: CASCADE
