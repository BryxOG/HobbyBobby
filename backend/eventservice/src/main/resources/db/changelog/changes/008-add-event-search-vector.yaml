                    'пляжный пляжбол пляж сетка подача блок '
                    'через сетку на песке в зале '

                  WHEN 'boxing' THEN
                    'boxing бокс боксёр боксер боксёрский боксерский '
                    'спарринг спарринг партнёр груша мешок ринги перчатки '
                    'ударка боксировать подраться на ринге '
                    'кикбоксинг кик мма единоборства '

                  WHEN 'skating' THEN
                    'skating коньки конёк конек каток лед лёд катание '
                    'фигурное фигурноекатание хоккейныеконьки '
                    'вднх катокнавднх покататься на коньках '

                  WHEN 'tennis' THEN
                    'tennis теннис теннисный теннисист корт ракетка мячик '
                    'большойтеннис падел паддл парный одиночный '
                    'ищу пару на теннис сыграть в теннис '

                  WHEN 'cycling' THEN
                    'cycling велопрогулка велосипед велосипедный вело велик '
                    'байк байкинг катание набережная парк трейл '
                    'крутануть покататься на велике велоклуб '
                    'шоссейный горный mtb '

                  WHEN 'baseball' THEN
                    'baseball бейсбол бейсбольный бита перчатка мяч поле '
                    'хоумран бейсболист '

                  WHEN 'bowling' THEN
                    'bowling боулинг боулить кегли дорожка страйк спар '
                    'шары боулингклуб послеработы боулинг после работы '

                  WHEN 'karaoke' THEN
                    'karaoke караоке петь песни песенки микрофон хиты '
                    'вокал поём поем спеть караокебар караоке-бар '
                    'девяностые двухтысячные попеть '

                  WHEN 'gaming' THEN
                    'gaming видеоигры игры гейминг геймер приставки консоль '
                    'фифа fifa nba2k csgo дота dota valorant '
                    'пк пкшка xbox playstation ps5 ps4 nintendo свитч '
                    'стим steam турнир ретро приставки ланлан '

                  WHEN 'art' THEN
                    'art творчество рисование рисуем рисунок скетчинг скетч '
                    'живопись гуашь акварель масло пленэр пленэр '
                    'художка художник краски холст мастеркласс '

                  WHEN 'crafts' THEN
                    'crafts рукоделие вязание вяжем спицы крючок шитьё шитье '
                    'хендмейд handmade вышивка бисер макраме '
                    'рукодельницы творческийвечер '

                  WHEN 'boardgames' THEN
                    'boardgames настолки настольные игры настолка настольки '
                    'мафия мафию монополияuno уно алиас имаджинариум '
                    'днд dnd днд дндшка каркассон колонизаторы '
                    'настольный клуб поиграть в настолки '

                  WHEN 'coffee' THEN
                    'coffee кофе кофеёк кофеек кофейку кофейке кофейне кофейня '
                    'кофеин кофеинчик капучино капуч латте американо эспрессо '
                    'раф флэт flatwhite матча matcha чайник '
                    'бахнем бахнуть бахнули выпьем выпить выпьемкофе '
                    'посидим посидеть сходим встретимся увидимся '
                    'кофебрейк кофе-брейк кофебрейк перерыв на кофе '
                    'кофемания знакомоства закофе кофеипоболтать '
                    'двойнойэспрессо чашечку кофейную '

                  WHEN 'bar' THEN
                    'bar бар барчик барик пиво пивко пивка пивас крафт '
                    'коктейли коктейльчик бокалы вино виночка '
                    'бахнем бахнуть выпьем выпить накатим накатить '
                    'сходим посидим бархоппинг бархоп пятница '
                    'паб пабах afterwork послеработы '

                  WHEN 'party' THEN
