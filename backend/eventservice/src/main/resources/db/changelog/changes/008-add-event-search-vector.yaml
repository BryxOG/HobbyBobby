                    'анонимные взаимопомощь ментал mental health '
                    'безопасноепространство '

                  ELSE coalesce(p_activity_id, '')
                END;
              $$;

              CREATE OR REPLACE FUNCTION events_build_search_vector(
                p_title TEXT,
                p_description TEXT,
                p_address TEXT,
                p_activity_id VARCHAR
              )
              RETURNS tsvector
              LANGUAGE sql
              IMMUTABLE
              AS $$
                SELECT
                  to_tsvector(
                    'simple',
                    coalesce(p_title, '') || ' ' ||
                    coalesce(p_description, '') || ' ' ||
                    coalesce(p_address, '') || ' ' ||
                    event_activity_search_text(p_activity_id)
                  );
              $$;

              ALTER TABLE events
                ADD COLUMN IF NOT EXISTS search_vector tsvector;

              CREATE OR REPLACE FUNCTION events_search_vector_trigger()
              RETURNS trigger
              LANGUAGE plpgsql
              AS $$
              BEGIN
                NEW.search_vector := events_build_search_vector(
                  NEW.title,
                  NEW.description,
                  NEW.address,
                  NEW.activity_id
                );
                RETURN NEW;
              END;
              $$;

              DROP TRIGGER IF EXISTS trg_events_search_vector ON events;
              CREATE TRIGGER trg_events_search_vector
                BEFORE INSERT OR UPDATE OF title, description, address, activity_id
                ON events
                FOR EACH ROW
                EXECUTE FUNCTION events_search_vector_trigger();

              UPDATE events
              SET search_vector = events_build_search_vector(title, description, address, activity_id);

              CREATE INDEX IF NOT EXISTS idx_events_search_vector
                ON events
                USING GIN (search_vector);
