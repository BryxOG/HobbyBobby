databaseChangeLog:
  - changeSet:
      id: 008-add-event-search-vector
      author: eventservice
      comment: Postgres FTS — search_vector, GIN, триггер и словарь синонимов активностей
      changes:
        - sql:
            splitStatements: false
            sql: |
              CREATE OR REPLACE FUNCTION event_activity_search_text(p_activity_id VARCHAR)
              RETURNS TEXT
              LANGUAGE sql
              IMMUTABLE
              AS $$
                SELECT CASE lower(p_activity_id)

                  WHEN 'basketball' THEN
                    'basketball баскетбол баскет баскетбольный баскетболист '
                    'стритбол стрит стритбол streetball 3х3 3x3 тринатри '
                    'кольцо щит площадка площадке дворик оранжевый мяч '
                    'данк данки слэмбол играть в баскет '

                  WHEN 'football' THEN
                    'football футбол футбик футбольчик футбольный футболист '
                    'soccer фут ногомяч 5х5 5x5 7х7 7x7 11х11 11x11 '
                    'поле газон резина дворовый дворовой пас гол вратарь '
                    'минифутбол мини-футбол футзали футзал '
                    'попинать мяч погонять в футбол '

                  WHEN 'volleyball' THEN
