databaseChangeLog:
  - changeSet:
      id: 005-create-tags-tables
      author: eventservice
      changes:
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: VARCHAR(64)
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_tags
                    nullable: false
              - column:
                  name: label
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
        - createTable:
            tableName: event_tags
            columns:
              - column:
                  name: event_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: tag_id
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: event_tags
            columnNames: event_id, tag_id
            constraintName: pk_event_tags
        - addForeignKeyConstraint:
            baseTableName: event_tags
            baseColumnNames: event_id
            referencedTableName: events
            referencedColumnNames: id
            constraintName: fk_event_tags_event
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: event_tags
            baseColumnNames: tag_id
            referencedTableName: tags
            referencedColumnNames: id
            constraintName: fk_event_tags_tag
            onDelete: RESTRICT
