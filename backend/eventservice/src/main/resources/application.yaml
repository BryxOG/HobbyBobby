spring:
  application:
    name: eventservice
  datasource:
    url: ${EVENTSERVICE_DB_URL:${DB_URL:jdbc:postgresql://localhost:5433/eventservice}}
    username: ${DB_USERNAME:hobbybobby}
    password: ${DB_PASSWORD:hobbybobby}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

app:
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:9002/userservice/api}
  chat:
    kafka-topic: chat.message.created
  notification:
    reminder-topic: event.reminder.due
    cancelled-topic: event.cancelled

server:
  port: ${SERVER_PORT:9011}
