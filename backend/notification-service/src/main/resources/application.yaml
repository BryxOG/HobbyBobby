spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/notificationservice
    username: ${DB_USERNAME:hobbybobby}
    password: ${DB_PASSWORD:hobbybobby}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: org.javaguru.notification.kafka
        spring.json.use.type.headers: false

app:
  notification:
    reminder-topic: event.reminder.due
    cancelled-topic: event.cancelled
  firebase:
    enabled: ${FIREBASE_ENABLED:true}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}

server:
  port: 9004
