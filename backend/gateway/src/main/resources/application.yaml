server:
  port: ${GATEWAY_PORT:9000}

spring:
  application:
    name: gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/hobbybobby}
  cloud:
    gateway:
      server:
        webmvc:
          trusted-proxies: 127\.0\.0\.1|10\..*|172\.(1[6-9]|2[0-9]|3[0-1])\..*|192\.168\..*

gateway:
  routes:
    event-service-url: ${EVENT_SERVICE_URL:http://localhost:9001}
    user-service-url: ${USER_SERVICE_URL:http://localhost:9002}
  cors:
    allowed-origins: ${GATEWAY_CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
